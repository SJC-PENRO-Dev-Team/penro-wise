<!-- DELETE WORK CYCLE MODAL -->
<div class="modal fade" id="deleteWorkcycleModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius: 12px; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.15);">

      <!-- HEADER -->
      <div class="modal-header border-0" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); border-radius: 12px 12px 0 0; padding: 1rem 1.25rem;">
        <div>
          <h6 class="modal-title text-white mb-0" style="font-weight: 600; font-size: 1rem;">
            <i class="fas fa-trash me-2"></i>
            Delete Work Cycle
          </h6>
        </div>
        <button type="button" class="btn-close btn-close-white btn-sm" data-bs-dismiss="modal"></button>
      </div>

      <!-- BODY - Normal Delete -->
      <div class="modal-body" id="deleteNormalBody" style="padding: 1.25rem;">
        <div class="text-center mb-3">
          <div class="rounded-circle bg-danger bg-opacity-10 d-inline-flex align-items-center justify-content-center mb-3" style="width: 64px; height: 64px;">
            <i class="fas fa-exclamation-triangle text-danger" style="font-size: 1.75rem;"></i>
          </div>
          <h6 class="fw-semibold mb-2">Confirm Deletion</h6>
          <p class="text-muted mb-0" style="font-size: 0.875rem;">
            Are you sure you want to permanently delete this work cycle?
          </p>
          <p class="text-danger fw-semibold mb-0 mt-2" style="font-size: 0.875rem;">
            This action cannot be undone.
          </p>
        </div>
      </div>

      <!-- BODY - Protected Error (hidden by default) -->
      <div class="modal-body d-none" id="deleteProtectedBody" style="padding: 1.25rem;">
        
        <!-- Warning Alert -->
        <div class="alert alert-warning mb-3" style="border-radius: 10px; font-size: 0.875rem;">
          <div class="d-flex align-items-start">
            <i class="fas fa-exclamation-triangle me-2 mt-1"></i>
            <div>
              <strong>Cannot Delete</strong>
              <p class="mb-0 mt-1 small" id="protectedMessage"></p>
            </div>
          </div>
        </div>
        
        <!-- Force Delete Section -->
        <div class="force-delete-section">
          <h6 class="fw-semibold mb-2" style="font-size: 0.875rem;">
            <i class="fas fa-bolt text-danger me-1"></i>
            Force Delete Option
          </h6>
          <p class="small text-muted mb-3" style="font-size: 0.8125rem;">
            Force delete will remove the work cycle but <strong>preserve</strong> all linked documents and folders.
            They will become unassigned.
          </p>
          
          <div class="mb-3">
            <label class="form-label small fw-semibold mb-1" style="font-size: 0.8125rem;">
              To confirm, type: <code id="confirmationPhrase" class="text-danger"></code>
            </label>
            <input type="text" 
                   class="form-control form-control-sm" 
                   id="forceDeleteConfirmInput"
                   placeholder="Type the confirmation phrase"
                   autocomplete="off"
                   style="font-family: monospace; font-size: 0.875rem;">
          </div>
        </div>
      </div>

      <!-- FOOTER -->
      <div class="modal-footer border-top" style="padding: 0.875rem 1.25rem;">
        <button type="button"
                class="btn btn-light btn-sm"
                data-bs-dismiss="modal"
                style="padding: 0.375rem 1rem; font-size: 0.875rem; border-radius: 8px;">
          <i class="fas fa-times me-1"></i>
          Cancel
        </button>

        <!-- Normal Delete Button -->
        <button type="button"
                class="btn btn-danger btn-sm"
                id="normalDeleteBtn"
                style="padding: 0.375rem 1rem; font-size: 0.875rem; border-radius: 8px; background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); border: none;">
          <i class="fas fa-trash me-1"></i>
          Yes, Delete
        </button>

        <!-- Force Delete Button (hidden by default) -->
        <button type="button"
                class="btn btn-danger btn-sm d-none"
                id="forceDeleteBtn"
                disabled
                style="padding: 0.375rem 1rem; font-size: 0.875rem; border-radius: 8px; background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); border: none;">
          <i class="fas fa-bolt me-1"></i>
          Force Delete
        </button>
      </div>

    </div>
  </div>
</div>
