<!-- CREATE WORK CYCLE MODAL -->
<div class="modal fade" id="createWorkcycleModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content" style="border-radius: 12px; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.15);">

      <form method="post" action="{% url 'admin_app:workcycle-create' %}"
            data-loading-text="Creating Work Cycle..."
            data-loading-message="Setting up assignments and sending notifications.">
        {% csrf_token %}

        <!-- HEADER (FIXED) -->
        <div class="modal-header sticky-top bg-white border-0" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); border-radius: 12px 12px 0 0; padding: 1rem 1.25rem;">
          <div>
            <h6 class="modal-title text-white mb-0" style="font-weight: 600; font-size: 1rem;">
              <i class="fas fa-sync-alt me-2"></i>
              Create Work Cycle
            </h6>
          </div>
          <button type="button" class="btn-close btn-close-white btn-sm" data-bs-dismiss="modal"></button>
        </div>

        <!-- BODY (SCROLLS ONLY HERE) -->
        <div class="modal-body overflow-auto" style="max-height: calc(90vh - 140px); padding: 1.25rem;">

          <!-- CONTEXT CARD -->
          <div class="border rounded-3 p-2 mb-3" style="background:linear-gradient(135deg,#d1fae5,#ffffff); border:1px solid #a7f3d0 !important;">
            <div class="d-flex align-items-center">
              <div class="rounded-circle bg-success bg-opacity-10 d-flex align-items-center justify-content-center me-2" style="width: 32px; height: 32px;">
                <i class="fas fa-sync-alt text-success" style="font-size: 0.875rem;"></i>
              </div>
              <div>
                <div class="text-muted" style="font-size: 0.7rem;">You are creating</div>
                <div class="fw-semibold" style="font-size: 0.875rem;">A new work cycle</div>
              </div>
            </div>
          </div>

          <!-- BASIC INFORMATION -->
          <div class="mb-3 section-card">
            <div class="section-title">Basic Information</div>

            <!-- TITLE -->
            <div class="mb-2 field-group">
              <label class="form-label fw-semibold mb-1" style="font-size: 0.8125rem;">
                Title <span class="text-danger">*</span>
              </label>

              <div class="title-input-wrap">
                <div class="input-group input-group-sm">
                  <span class="input-group-text">
                    <i class="fas fa-tasks" style="font-size: 0.875rem;"></i>
                  </span>
                  <input type="text"
                         name="title"
                         id="workcycleTitle"
                         class="form-control"
                         placeholder="e.g. Monthly Accomplishment Report"
                         autocomplete="off"
                         required>
                </div>

                <div class="title-suggestions d-none" id="titleSuggestions"></div>
              </div>

              <div class="field-error-text d-none"></div>
            </div>

            <!-- DESCRIPTION -->
            <div class="field-group">
              <label class="form-label fw-semibold mb-1" style="font-size: 0.8125rem;">Description</label>

              <div class="input-group input-group-sm">
                <span class="input-group-text">
                  <i class="fas fa-align-left" style="font-size: 0.875rem;"></i>
                </span>
                <textarea name="description"
                          class="form-control"
                          rows="2"
                          placeholder="Brief description (optional)"
                          style="font-size: 0.875rem;"></textarea>
              </div>

              <div class="field-error-text d-none"></div>
            </div>
          </div>

          <!-- SCHEDULE -->
          <div class="mb-3 section-card">
            <div class="section-title">Schedule</div>

            <div class="field-group">
              <label class="form-label fw-semibold mb-1" style="font-size: 0.8125rem;">
                Due Date <span class="text-danger">*</span>
              </label>

              <div class="input-group input-group-sm">
                <span class="input-group-text">
                  <i class="far fa-calendar-alt" style="font-size: 0.875rem;"></i>
                </span>
                <input type="text"
                       name="due_at"
                       id="dueDatePicker"
                       class="form-control"
                       placeholder="Select date and time"
                       autocomplete="off"
                       required>
              </div>

              <div class="field-error-text d-none"></div>
            </div>
          </div>

          <!-- ASSIGNMENT -->
          <div class="mb-3 section-card">
            <div class="section-title">Assignment</div>

            <!-- ASSIGN USERS -->
            <div id="assignUsersSection" class="mb-2 field-group">
              <label class="form-label fw-semibold mb-1" style="font-size: 0.8125rem;">Assign By Focals</label>

              <div id="userAssignList">
                <div class="d-flex align-items-center mb-2 user-row">
                  <div class="user-combo flex-grow-1">
                    <input type="hidden" name="users[]" class="user-hidden">

                    <div class="user-display">
                      <i class="fas fa-user me-2 text-muted" style="font-size: 0.875rem;"></i>
                      <input type="text"
                             class="user-input"
                             placeholder="Type to search focals..."
                             autocomplete="off"
                             style="font-size: 0.875rem;">
                      <i class="fas fa-chevron-down ms-auto text-muted" style="font-size: 0.75rem;"></i>
                    </div>

                    <div class="user-dropdown">
                      {% for user in users %}
                      <div class="user-option"
                           data-id="{{ user.id }}"
                           data-label="{{ user.get_full_name|default:user.username }}">
                        {{ user.get_full_name|default:user.username }}
                      </div>
                      {% endfor %}
                    </div>
                  </div>

                  <button type="button"
                          class="btn btn-outline-danger btn-sm ms-2 remove-user"
                          style="display:none; padding: 0.25rem 0.5rem; font-size: 0.875rem;">✕</button>
                </div>
              </div>

              <div class="field-error-text d-none"></div>

              <button type="button"
                      class="btn btn-sm btn-outline-primary mt-2"
                      id="addUserBtn"
                      style="padding: 0.25rem 0.75rem; font-size: 0.8125rem;">
                <i class="fas fa-plus me-1"></i> Add user
              </button>
            </div>

            <!-- OR DIVIDER -->
            <div class="or-divider">— OR —</div>

            <!-- ASSIGN TEAM -->
            <div id="assignTeamSection" class="field-group">
              <label class="form-label fw-semibold mb-1" style="font-size: 0.8125rem;">Assign Team</label>

              <div class="input-group input-group-sm">
                <span class="input-group-text">
                  <i class="fas fa-users" style="font-size: 0.875rem;"></i>
                </span>
                <select name="team" id="teamSelect" class="form-select">
                  <option value="">Select a team</option>
                  {% for team in teams %}
                  <option value="{{ team.id }}">{{ team.name }}</option>
                  {% endfor %}
                </select>
              </div>

              <div class="field-error-text d-none"></div>
            </div>
          </div>

        </div>

        <!-- FOOTER (FIXED) -->
        <div class="modal-footer sticky-bottom bg-white border-top" style="padding: 0.875rem 1.25rem;">
          <button type="button"
                  class="btn btn-light btn-sm"
                  data-bs-dismiss="modal"
                  style="padding: 0.375rem 1rem; font-size: 0.875rem; border-radius: 8px;">
            <i class="fas fa-times me-1"></i>
            Cancel
          </button>

          <button type="submit" class="btn btn-success btn-sm" style="padding: 0.375rem 1rem; font-size: 0.875rem; border-radius: 8px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); border: none;">
            <i class="fas fa-check me-1"></i>
            Create Work Cycle
          </button>
        </div>

      </form>
    </div>
  </div>
</div>

<!-- ================================
     STYLES (ONE FILE)
================================ -->

<!-- JS -->
 <script>
  document.addEventListener("DOMContentLoaded", () => {

  const input = document.getElementById("workcycleTitle");
  const box = document.getElementById("titleSuggestions");

  if (!input || !box) return;

  const now = new Date();
  const month = now.toLocaleString("default", { month: "long" });
  const year = now.getFullYear();

  // Naming patterns
  const patterns = [
    "Accomplishment Report",
    "Work Cycle",
    "Performance Board",
    "Compliance Monitoring",
    "Operations Board",
    "Monthly Activity Report"
  ];

  function renderSuggestions() {
    box.innerHTML = "";
    patterns.forEach(p => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = `${month} ${p} ${year}`;
      btn.addEventListener("click", () => {
        input.value = btn.textContent;
        box.classList.add("d-none");
      });
      box.appendChild(btn);
    });
    box.classList.remove("d-none");
  }

  // Show suggestions when input is focused and empty
  input.addEventListener("focus", () => {
    if (!input.value) renderSuggestions();
  });

  // Hide when typing
  input.addEventListener("input", () => {
    box.classList.add("d-none");
  });

  // Hide when clicking outside
  document.addEventListener("click", e => {
    if (!box.contains(e.target) && e.target !== input) {
      box.classList.add("d-none");
    }
  });
  flatpickr("#dueDatePicker", {
    enableTime: true,
    dateFormat: "Y-m-d H:i",
    time_24hr: true,
    minuteIncrement: 5,
    defaultHour: 17
  });

});
 </script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const usersSection = document.getElementById("assignUsersSection");
  const teamSection = document.getElementById("assignTeamSection");
  const teamSelect = document.getElementById("teamSelect");
  const userList = document.getElementById("userAssignList");

  function hasAssignedUsers() {
    return [...document.querySelectorAll(".user-hidden")]
      .some(i => i.value);
  }

  function toggleAssignSections() {
    const usersSelected = hasAssignedUsers();
    const teamSelected = teamSelect.value !== "";

    // if users assigned → hide team
    teamSection.style.display = usersSelected ? "none" : "block";

    // optional: if team selected → hide users
    usersSection.style.display = teamSelected ? "none" : "block";

    // cleanup values to avoid mixed submit
    if (usersSelected) {
      teamSelect.value = "";
    }

    // only clear users when team is manually selected
if (teamSelected && document.activeElement === teamSelect) {
  document.querySelectorAll(".user-hidden").forEach(i => i.value = "");
  document.querySelectorAll(".user-input").forEach(i => i.value = "");
}

  }

  // run on page load
  toggleAssignSections();

  // when team changes
  teamSelect.addEventListener("change", toggleAssignSections);

  // when user is selected (combo click)
  userList.addEventListener("click", e => {
    if (e.target.classList.contains("user-option")) {
      setTimeout(toggleAssignSections, 0);
    }
  });

  // when user row is removed
  userList.addEventListener("click", e => {
    if (e.target.classList.contains("remove-user")) {
      setTimeout(toggleAssignSections, 0);
    }
  });

  // when new row added
  document.getElementById("addUserBtn")
    .addEventListener("click", () => {
      setTimeout(toggleAssignSections, 0);
    });
});
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const userList = document.getElementById("userAssignList");
  const addBtn = document.getElementById("addUserBtn");

  /* ============================
     ADD USER ROW
     ============================ */
  addBtn.addEventListener("click", () => {
    const row = userList.firstElementChild.cloneNode(true);

    // reset values
    row.querySelector(".user-input").value = "";
    row.querySelector(".user-hidden").value = "";
    row.querySelector(".user-dropdown").style.display = "none";
    row.querySelector(".remove-user").style.display = "inline-block";

    userList.appendChild(row);
  });

  /* ============================
     REMOVE / CLEAR USER ROW
     ============================ */
  userList.addEventListener("click", e => {
    if (!e.target.classList.contains("remove-user")) return;

    const row = e.target.closest(".user-row");
    const rows = userList.querySelectorAll(".user-row");

    if (rows.length === 1) {
      // 🔁 FIRST ROW → CLEAR ONLY (do NOT remove)
      row.querySelector(".user-hidden").value = "";
      row.querySelector(".user-input").value = "";
      row.querySelector(".user-dropdown").style.display = "none";
      row.querySelector(".remove-user").style.display = "none";
    } else {
      // 🗑 EXTRA ROWS → REMOVE
      row.remove();
    }

    // 🔄 re-sync UI state
    setTimeout(() => {
      if (typeof refreshDropdowns === "function") {
        refreshDropdowns();
      }
      if (typeof toggleAssignSections === "function") {
        toggleAssignSections();
      }
    }, 0);
  });
});
</script>



<script>
document.addEventListener("DOMContentLoaded", () => {

  function getSelectedUserIds() {
    return [...document.querySelectorAll(".user-hidden")]
      .map(i => i.value)
      .filter(Boolean);
  }

  function refreshDropdowns() {
    const selected = getSelectedUserIds();

    document.querySelectorAll(".user-row").forEach(row => {
      const combo = row.querySelector(".user-combo");
      if (!combo) return;

      const hidden = combo.querySelector(".user-hidden");
      const options = combo.querySelectorAll(".user-option");

      options.forEach(opt => {
        const id = opt.dataset.id;

        // permanently hide selected users from other rows
        opt.dataset.blocked =
          selected.includes(id) && hidden.value !== id ? "1" : "0";
      });
    });
  }

  function attachUserCombo(row){
    const combo = row.querySelector(".user-combo");
    if (!combo) return;

    const input = combo.querySelector(".user-input");
    const hidden = combo.querySelector(".user-hidden");
    const dropdown = combo.querySelector(".user-dropdown");
    const options = [...combo.querySelectorAll(".user-option")];

    input.addEventListener("focus", () => {
      refreshDropdowns();
      dropdown.style.display = "block";

      // apply visibility
      options.forEach(opt => {
        opt.style.display = opt.dataset.blocked === "1" ? "none" : "block";
      });
    });

    combo.addEventListener("click", () => input.focus());

    input.addEventListener("input", () => {
      const q = input.value.toLowerCase();

      options.forEach(opt => {
        if (opt.dataset.blocked === "1") {
          opt.style.display = "none";
          return;
        }

        opt.style.display = opt.dataset.label.toLowerCase().includes(q)
          ? "block"
          : "none";
      });
    });

    options.forEach(opt => {
  opt.addEventListener("click", () => {
    hidden.value = opt.dataset.id;
    input.value = opt.dataset.label;
    dropdown.style.display = "none";

    // ✅ show remove button even for first row
    const row = combo.closest(".user-row");
    row.querySelector(".remove-user").style.display = "inline-block";

    refreshDropdowns();
  });
});


    document.addEventListener("click", e => {
      if (!combo.contains(e.target)) dropdown.style.display = "none";
    });
  }

  document.querySelectorAll(".user-row").forEach(attachUserCombo);

  const observer = new MutationObserver(muts => {
    muts.forEach(m =>
      m.addedNodes.forEach(n => {
        if (n.classList?.contains("user-row")) {
          attachUserCombo(n);
          refreshDropdowns();
        }
      })
    );
  });

  observer.observe(document.getElementById("userAssignList"), {
    childList: true
  });

});
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {

  const modal = document.getElementById("createWorkcycleModal");
  const form  = modal.querySelector("form");

  const titleInput = document.getElementById("workcycleTitle");
  const dueInput   = document.getElementById("dueDatePicker");
  const teamSelect = document.getElementById("teamSelect");

  /* ==========================
     HELPERS
     ========================== */

  function hasAssignedUsers() {
    return [...document.querySelectorAll(".user-hidden")]
      .some(i => i.value.trim() !== "");
  }

  function clearErrors() {
    modal.querySelectorAll(".field-error-text").forEach(el => {
      el.textContent = "";
      el.classList.add("d-none");
    });

    modal.querySelectorAll(".field-error-label")
      .forEach(el => el.classList.remove("field-error-label"));

    modal.querySelectorAll(".field-error-input")
      .forEach(el => el.classList.remove("field-error-input"));
  }

  function showFieldError(fieldWrapper, inputEl, message) {
    if (!fieldWrapper) return;

    const label = fieldWrapper.querySelector("label");
    const error = fieldWrapper.querySelector(".field-error-text");

    if (label) label.classList.add("field-error-label");

    if (inputEl) {
      inputEl.classList.add("field-error-input");
      inputEl.focus();
    }

    if (error) {
      error.textContent = message;
      error.classList.remove("d-none");
    }
  }

  /* ==========================
     FORM SUBMIT VALIDATION
     ========================== */

  form.addEventListener("submit", e => {
    clearErrors();

    /* ---------- TITLE ---------- */
    if (!titleInput.value.trim()) {
      e.preventDefault();
      showFieldError(
        titleInput.closest(".mb-3"),
        titleInput,
        "Title is required."
      );
      return;
    }

    /* ---------- DUE DATE ---------- */
    if (!dueInput.value.trim()) {
      e.preventDefault();
      showFieldError(
        dueInput.closest(".mb-4"),
        dueInput,
        "Due date is required."
      );
      return;
    }

    /* ---------- ASSIGNMENT ---------- */
    const usersSelected = hasAssignedUsers();
    const teamSelected  = teamSelect.value !== "";

    if (!usersSelected && !teamSelected) {
      e.preventDefault();
      showFieldError(
        document.getElementById("assignUsersSection"),
        null,
        "Assign at least one user or select a team."
      );
      return;
    }

    if (usersSelected && teamSelected) {
      e.preventDefault();
      showFieldError(
        document.getElementById("assignTeamSection"),
        teamSelect,
        "Choose users OR a team, not both."
      );
      return;
    }

    // ✅ Passed all checks → form submits normally
  });

});
</script>
