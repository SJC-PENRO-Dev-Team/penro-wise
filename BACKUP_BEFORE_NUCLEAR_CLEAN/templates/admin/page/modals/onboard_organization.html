<!-- Single Modal Onboarding for Organization Setup -->
<div class="container-fluid p-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-10 col-xl-8">
      
      <!-- Header -->
      <div class="text-center mb-4">
        <h4 class="fw-bold mb-2">
          <i class="fas fa-building text-primary me-2"></i>
          Organization Setup
        </h4>
        <p class="text-muted mb-0">
          Configure organizational assignment for <strong>{{ user.get_full_name|default:user.username }}</strong>
        </p>
      </div>

      <!-- Form -->
      <form id="organizationSetupForm" method="post" action="{% url 'admin_app:onboard-organization' user.id %}">
        {% csrf_token %}

        <!-- Division Selection -->
        <div class="mb-3">
          <label for="divisionSelect" class="form-label fw-semibold">
            <i class="fas fa-building text-primary me-1"></i>
            Division <span class="text-danger">*</span>
          </label>
          <select class="form-select" id="divisionSelect" name="division" required>
            <option value="">Select Division...</option>
            {% for division in divisions %}
            <option value="{{ division.id }}">{{ division.name }}</option>
            {% endfor %}
          </select>
          <div class="invalid-feedback">Please select a division.</div>
        </div>

        <!-- Section Selection (hidden until division selected) -->
        <div class="mb-3" id="sectionGroup" style="display: none;">
          <label for="sectionSelect" class="form-label fw-semibold">
            <i class="fas fa-layer-group text-primary me-1"></i>
            Section <span class="text-danger">*</span>
          </label>
          <select class="form-select" id="sectionSelect" name="section" required disabled>
            <option value="">Select Division first...</option>
          </select>
          <div class="invalid-feedback">Please select a section.</div>
        </div>

        <!-- Service Selection (hidden until section selected) -->
        <div class="mb-3" id="serviceGroup" style="display: none;">
          <label for="serviceSelect" class="form-label fw-semibold">
            <i class="fas fa-cogs text-primary me-1"></i>
            Service <span class="text-muted">(Optional)</span>
          </label>
          <select class="form-select" id="serviceSelect" name="service" disabled>
            <option value="">Select Section first...</option>
          </select>
        </div>

        <!-- Unit Selection (hidden until section selected) -->
        <div class="mb-3" id="unitGroup" style="display: none;">
          <label for="unitSelect" class="form-label fw-semibold">
            <i class="fas fa-users text-primary me-1"></i>
            Unit <span class="text-muted">(Optional)</span>
          </label>
          <select class="form-select" id="unitSelect" name="unit" disabled>
            <option value="">Select Section/Service first...</option>
          </select>
        </div>

        <!-- Action Buttons -->
        <div class="d-flex justify-content-end gap-2 mt-4">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            Cancel
          </button>
          <button type="submit" class="btn btn-primary" id="submitOrgSetup">
            <i class="fas fa-check me-1"></i>
            Complete Setup
          </button>
        </div>
      </form>

    </div>
  </div>
</div>

<script>
(function() {
  const form = document.getElementById('organizationSetupForm');
  const divisionSelect = document.getElementById('divisionSelect');
  const sectionSelect = document.getElementById('sectionSelect');
  const serviceSelect = document.getElementById('serviceSelect');
  const unitSelect = document.getElementById('unitSelect');
  const submitBtn = document.getElementById('submitOrgSetup');

  // Dependent dropdown logic
  divisionSelect.addEventListener('change', async function() {
    const divisionId = this.value;
    
    // Reset and hide dependent dropdowns
    const sectionGroup = document.getElementById('sectionGroup');
    const serviceGroup = document.getElementById('serviceGroup');
    const unitGroup = document.getElementById('unitGroup');
    
    sectionSelect.innerHTML = '<option value="">Loading...</option>';
    sectionSelect.disabled = true;
    serviceSelect.innerHTML = '<option value="">Select Section first...</option>';
    serviceSelect.disabled = true;
    unitSelect.innerHTML = '<option value="">Select Section/Service first...</option>';
    unitSelect.disabled = true;
    
    // Hide dependent groups
    sectionGroup.style.display = 'none';
    serviceGroup.style.display = 'none';
    unitGroup.style.display = 'none';

    if (!divisionId) {
      sectionSelect.innerHTML = '<option value="">Select Division first...</option>';
      return;
    }

    try {
      const response = await fetch(`/admin/api/teams/sections/?division=${divisionId}`);
      const sections = await response.json();
      
      sectionSelect.innerHTML = '<option value="">Select Section...</option>';
      sections.forEach(section => {
        const option = document.createElement('option');
        option.value = section.id;
        option.textContent = section.name;
        sectionSelect.appendChild(option);
      });
      sectionSelect.disabled = false;
      
      // Show section group
      sectionGroup.style.display = 'block';
    } catch (error) {
      console.error('Error loading sections:', error);
      sectionSelect.innerHTML = '<option value="">Error loading sections</option>';
    }
  });

  sectionSelect.addEventListener('change', async function() {
    const sectionId = this.value;
    
    // Reset and hide dependent dropdowns
    const serviceGroup = document.getElementById('serviceGroup');
    const unitGroup = document.getElementById('unitGroup');
    
    serviceSelect.innerHTML = '<option value="">Loading...</option>';
    serviceSelect.disabled = true;
    unitSelect.innerHTML = '<option value="">Loading...</option>';
    unitSelect.disabled = true;
    
    // Hide dependent groups
    serviceGroup.style.display = 'none';
    unitGroup.style.display = 'none';

    if (!sectionId) {
      serviceSelect.innerHTML = '<option value="">Select Section first...</option>';
      unitSelect.innerHTML = '<option value="">Select Section/Service first...</option>';
      return;
    }

    try {
      // Load services
      const servicesResponse = await fetch(`/admin/api/teams/services/?section=${sectionId}`);
      const services = await servicesResponse.json();
      
      serviceSelect.innerHTML = '<option value="">None (Optional)</option>';
      services.forEach(service => {
        const option = document.createElement('option');
        option.value = service.id;
        option.textContent = service.name;
        serviceSelect.appendChild(option);
      });
      serviceSelect.disabled = false;

      // Load units for section
      const unitsResponse = await fetch(`/admin/api/teams/units/?section=${sectionId}`);
      const units = await unitsResponse.json();
      
      unitSelect.innerHTML = '<option value="">None (Optional)</option>';
      units.forEach(unit => {
        const option = document.createElement('option');
        option.value = unit.id;
        option.textContent = unit.name;
        unitSelect.appendChild(option);
      });
      unitSelect.disabled = false;
      
      // Show service and unit groups
      serviceGroup.style.display = 'block';
      unitGroup.style.display = 'block';
    } catch (error) {
      console.error('Error loading services/units:', error);
      serviceSelect.innerHTML = '<option value="">Error loading services</option>';
      unitSelect.innerHTML = '<option value="">Error loading units</option>';
    }
  });

  serviceSelect.addEventListener('change', async function() {
    const serviceId = this.value;
    
    if (!serviceId) {
      // If no service selected, show units from section
      const sectionId = sectionSelect.value;
      if (sectionId) {
        try {
          const unitsResponse = await fetch(`/admin/api/teams/units/?section=${sectionId}`);
          const units = await unitsResponse.json();
          
          unitSelect.innerHTML = '<option value="">None (Optional)</option>';
          units.forEach(unit => {
            const option = document.createElement('option');
            option.value = unit.id;
            option.textContent = unit.name;
            unitSelect.appendChild(option);
          });
        } catch (error) {
          console.error('Error loading units:', error);
        }
      }
      return;
    }

    // Load units for service
    unitSelect.innerHTML = '<option value="">Loading...</option>';
    unitSelect.disabled = true;

    try {
      const unitsResponse = await fetch(`/admin/api/teams/units/?service=${serviceId}`);
      const units = await unitsResponse.json();
      
      unitSelect.innerHTML = '<option value="">None (Optional)</option>';
      units.forEach(unit => {
        const option = document.createElement('option');
        option.value = unit.id;
        option.textContent = unit.name;
        unitSelect.appendChild(option);
      });
      unitSelect.disabled = false;
    } catch (error) {
      console.error('Error loading units:', error);
      unitSelect.innerHTML = '<option value="">Error loading units</option>';
    }
  });

  // Form submission
  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    // Validate required fields
    if (!divisionSelect.value || !sectionSelect.value) {
      form.classList.add('was-validated');
      return;
    }

    const originalHTML = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Processing...';

    try {
      const formData = new FormData(form);
      const response = await fetch(form.action, {
        method: 'POST',
        body: formData,
        headers: {
          'X-Requested-With': 'XMLHttpRequest'
        }
      });

      const data = await response.json();

      if (data.success) {
        // Hide the modal
        const modal = bootstrap.Modal.getInstance(document.getElementById('wizardOrgSetupFlow'));
        if (modal) {
          modal.hide();
        }

        // Show loading modal
        showLoadingModal('Completing Setup...', 'Saving organization and sending notification email.');

        // Redirect after delay
        setTimeout(() => {
          window.location.href = data.redirect_url || '/admin/users/';
        }, 2000);
      } else {
        alert(data.error || 'Failed to complete setup. Please try again.');
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalHTML;
      }
    } catch (error) {
      console.error('Error:', error);
      alert('An error occurred. Please try again.');
      submitBtn.disabled = false;
      submitBtn.innerHTML = originalHTML;
    }
  });

  // Loading modal function
  function showLoadingModal(title, message) {
    let loadingModal = document.getElementById('onboardingLoadingModal');
    if (!loadingModal) {
      const modalHTML = `
        <div class="modal fade" id="onboardingLoadingModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 16px; border: none; overflow: hidden;">
              <div class="modal-body text-center p-5">
                <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
                  <span class="visually-hidden">Loading...</span>
                </div>
                <h5 class="mb-2" id="loadingModalTitle"></h5>
                <p class="text-muted mb-0" id="loadingModalMessage"></p>
              </div>
            </div>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', modalHTML);
      loadingModal = document.getElementById('onboardingLoadingModal');
    }
    
    document.getElementById('loadingModalTitle').textContent = title;
    document.getElementById('loadingModalMessage').textContent = message;
    
    const modal = new bootstrap.Modal(loadingModal);
    modal.show();
  }
})();
</script>
